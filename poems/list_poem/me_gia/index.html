<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mẹ già</title>

    <!-- Liên kết tới FontAwesome cho các biểu tượng -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Liên kết tới file CSS riêng (audio.css) -->
    <link rel="stylesheet" href="../../css/audio.css">

    <style>
        body{
            font-family: 'Georgia', serif;
            background:#f2f2f2;
            margin:0;
            padding:40px;
        }

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:40px;
        }

        .poem-header{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .poem-title{
            font-size:36px;
            font-weight:bold;
        }

.poem-content {
    margin-top: 40px;
    max-width: 600px;
    line-height: 1.8;
    font-size: 20px;
    text-align: justify;
    font-style: italic; /* Đổi kiểu chữ thành in nghiêng */
    font-family: Viner Hand ITC;
}

        .poem-image{
            background-image:url('image.jpg');
            background-size:cover;
            background-position:center;
            width:300px;
            height:400px;
            border-radius:8px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="container">

    <div>
        <!-- HEADER -->
        <div class="poem-header">
            <div class="poem-title">MẸ GIÀ</div>
            <i class="fa-solid fa-volume-high audio-icon" id="audioIcon"></i>
            <div class="audio-player" id="player">
                <div class="play-btn" id="playBtn">
                    <i class="fa-solid fa-play"></i>
                </div>
                <div class="progress-container" id="progressContainer">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="time" id="time">00:00</div>
            </div>
        </div>

        <audio id="audio">
            <source src="audio.mp3" type="audio/mpeg">
        </audio>

        <pre class="poem-content">
	Mẹ già ngồi vá áo nâu
Mồ hôi nước mắt nhuộm nâu bốn mùa.
				 ---NTK---
        </pre>

    </div>

    <div class="poem-image"></div>

</div>

<script src="../../js/audio.js"></script>

</body>
</html>
