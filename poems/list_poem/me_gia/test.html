<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mẹ Già</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= LAYOUT CHUNG ================= */

body{
    margin:0;
    padding:70px 0;
    font-family:'Georgia', serif;
    overflow-x:hidden;
    background:url("background.jpg") center/cover no-repeat;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    padding:0 40px;
}

.poem-box{
    position:relative;
    background:rgba(255,255,255,0.65);
    padding:30px 25px;
    padding-top:65px;
    border-radius:16px;
    width:500px;
    box-shadow:0 12px 28px rgba(0,0,0,0.18);
}

/* ===== NÚT BACK ===== */

.back-btn{
    position:absolute;
    top:-25px;
    left:-10px;
}

.back-btn img{
    width:48px;
    display:block;
    filter: drop-shadow(3px 5px 6px rgba(0,0,0,0.25));
    transition: transform 0.3s ease;
}

@keyframes softShake{
    0% { transform:rotate(0deg); }
    25% { transform:rotate(-3deg); }
    50% { transform:rotate(2deg); }
    75% { transform:rotate(-2deg); }
    100% { transform:rotate(0deg); }
}

.back-btn:hover img{
    animation: softShake 0.6s ease-in-out;
}

/* ===== TIÊU ĐỀ ===== */

#poem-title{
    font-size:34px;
    font-weight:bold;
    text-align:center;
    margin-bottom:18px;
    color:#3a2e2e;
    font-family:'Bahnschrift', cursive;
}

/* ===== NỘI DUNG ===== */

#poem-content{
    line-height:1.8;
    font-size:20px;
    text-align:center;
    font-style:italic;
    font-family:'Viner Hand ITC', cursive;
    white-space:pre-wrap;
    color:#2b1d1d;
}

/* ===== ẢNH BÊN PHẢI ===== */

.poem-image{
    background-image:url("image.jpg");
    background-size:cover;
    background-position:center;
    width:300px;
    height:400px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* ================= AUDIO PLAYER ================= */

.audio-player {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    padding: 8px 15px;
    border-radius: 30px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    width: 0;
    overflow: hidden;
    opacity: 0;
    transition: all 0.35s ease;
}

.audio-player.show {
    width: 320px;
    opacity: 1;
    display:flex;
    align-items:center;
}

.audio-icon {
    font-size: 22px;
    color: #444;
    cursor: pointer;
    transition: 0.3s;
    display: block;
}

.audio-wrapper{
    margin-top:25px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
}

.audio-icon:hover {
    color: #1e88ff;
}

.play-btn {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #1e88ff;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.progress-container {
    width: 180px;
    height: 6px;
    background: #ddd;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
}

.progress {
    height: 100%;
    width: 0%;
    background: #1e88ff;
    border-radius: 10px;
}

.time {
    font-size: 13px;
    color: #555;
    min-width: 60px;
}

</style>
</head>

<body>

<div class="container">

<div class="poem-box">

<a href="../../tho-banh.html" class="back-btn">
<img src="../../icon.jpg">
</a>

<div id="poem-title">Mẹ Già</div>

<pre id="poem-content">
   Mẹ già ngồi vá áo nâu
Mồ hôi nước mắt nhuộm nâu bốn mùa
   Mẹ cười như gió đêm trăng
Như bờ môi ấm lăn tăn giấc nồng. 
			---NTK---
</pre>

<div class="audio-wrapper">

<i class="fa-solid fa-volume-high audio-icon" id="audioIcon"></i>

<div class="audio-player" id="player">

<div class="play-btn" id="playBtn">
<i class="fa-solid fa-play"></i>
</div>

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
</div>

<div class="time" id="time">00:00</div>

</div>
</div>

<audio id="audio">
<source src="audio.mp3" type="audio/mpeg">
</audio>

</div>

<div class="poem-image"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const audio = document.getElementById("audio");
    const audioIcon = document.getElementById("audioIcon");
    const player = document.getElementById("player");
    const playBtn = document.getElementById("playBtn");
    const progress = document.getElementById("progress");
    const progressContainer = document.getElementById("progressContainer");
    const timeDisplay = document.getElementById("time");

    if(!audio) return;

    let isOpen = false;

    audioIcon.style.display = "none";
    player.classList.remove("show");

    audio.addEventListener("loadedmetadata", () => {
        audioIcon.style.display = "inline-block";
    });

    audioIcon.addEventListener("click", () => {

        if(!isOpen){
            player.classList.add("show");
            audio.play();
            audioIcon.classList.remove("fa-volume-xmark");
            audioIcon.classList.add("fa-volume-high");
            playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            isOpen = true;
        } 
        else{
            audio.pause();
            player.classList.remove("show");
            audioIcon.classList.remove("fa-volume-high");
            audioIcon.classList.add("fa-volume-xmark");
            playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            isOpen = false;
        }
    });

    playBtn.addEventListener("click", () => {
        if(audio.paused){
            audio.play();
            playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        }else{
            audio.pause();
            playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
        }
    });

    audio.addEventListener("timeupdate", () => {

        if(!audio.duration) return;

        const percent = (audio.currentTime / audio.duration) * 100;
        progress.style.width = percent + "%";

        let minutes = Math.floor(audio.currentTime / 60);
        let seconds = Math.floor(audio.currentTime % 60);

        if(seconds < 10) seconds = "0" + seconds;

        timeDisplay.textContent = minutes + ":" + seconds;
    });

    progressContainer.addEventListener("click", (e) => {

        if(!audio.duration) return;

        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;

        audio.currentTime = (clickX / width) * audio.duration;
    });

});

window.onload = function(){
    window.parent.postMessage(
        document.body.scrollHeight, "*"
    );
};

</script>

</body>
</html>
