<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thơ Bành</title>

<script src="poems-data.js"></script>

<style>
body { font-family: Arial; }

select, input {
    padding: 8px;
    margin: 5px;
}

#suggestions {
    border: 1px solid #ccc;
    max-width: 300px;
    position: absolute;
    background: white;
}

.suggest-item {
    padding: 5px;
    cursor: pointer;
}

.suggest-item:hover {
    background: #eee;
}
</style>

</head>
<body>

<h2>📚 Thư viện Thơ</h2>

<!-- Bộ lọc -->
<select id="filterTheLoai">
  <option value="">-- Chọn Thể Loại --</option>
  <option value="Tình yêu">Tình yêu</option>
  <option value="Buồn">Buồn</option>
  <option value="Đơn phương">Đơn phương</option>
  <option value="Quê hương">Quê hương</option>
</select>

<select id="filterTheTho">
  <option value="">-- Chọn Thể Thơ --</option>
  <option value="Lục bát">Lục bát</option>
  <option value="Tự do">Tự do</option>
  <option value="Thất ngôn">Thất ngôn</option>
  <option value="Ngũ ngôn">Ngũ ngôn</option>
  <option value="Song thất lục bát">Song thất lục bát</option>
  <option value="Haiku">Haiku</option>
</select>

<br>

<!-- Thanh tìm kiếm -->
<input type="text" id="searchBox" placeholder="Tìm tên bài thơ...">
<div id="suggestions"></div>

<br><br>

<!-- Danh sách -->
<ul id="poemList"></ul>

<script>

const list = document.getElementById("poemList");
const searchBox = document.getElementById("searchBox");
const suggestions = document.getElementById("suggestions");

function renderList(data) {
    list.innerHTML = "";
    data.forEach(poem => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="${poem.file}">${poem.title}</a>
        (${poem.theloai} - ${poem.thetho})`;
        list.appendChild(li);
    });
}

renderList(poems);


// ===== FILTER =====
document.getElementById("filterTheLoai").addEventListener("change", filterPoems);
document.getElementById("filterTheTho").addEventListener("change", filterPoems);

function filterPoems() {
    const tl = filterTheLoai.value;
    const tt = filterTheTho.value;

    const filtered = poems.filter(p =>
        (tl === "" || p.theloai === tl) &&
        (tt === "" || p.thetho === tt)
    );

    renderList(filtered);
}


// ===== SEARCH GỢI Ý =====
searchBox.addEventListener("input", function() {
    const value = this.value.toLowerCase();
    suggestions.innerHTML = "";

    if(value === "") return;

    const matched = poems.filter(p =>
        p.title.toLowerCase().includes(value)
    );

    matched.forEach(p => {
        const div = document.createElement("div");
        div.className = "suggest-item";
        div.textContent = p.title;
        div.onclick = () => {
            window.location.href = p.file;
        };
        suggestions.appendChild(div);
    });
});

</script>

</body>
</html>
