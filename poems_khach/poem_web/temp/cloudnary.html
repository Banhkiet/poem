<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload Cloudinary</title>
</head>

<body>

<h3>Upload ảnh</h3>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<p id="msg"></p>

<script>

async function upload(){

const file=document.getElementById("file").files[0];
const msg=document.getElementById("msg");

if(!file){
msg.innerText="Chưa chọn file";
return;
}

msg.innerText="Đang upload...";

const url=await uploadFile(file);

msg.innerText="Upload thành công!";
console.log(url);

}

async function uploadFile(file){

if(!file) return "";

const url="https://api.cloudinary.com/v1_1/dp6rc7ghq/auto/upload";

const formData=new FormData();

formData.append("file",file);
formData.append("upload_preset","uploadfilepoem");

/* folder muốn tạo */

formData.append("folder","NGUYEN");

const res=await fetch(url,{
method:"POST",
body:formData
});

const data=await res.json();

return data.secure_url;

}

</script>
</body>
</html>
