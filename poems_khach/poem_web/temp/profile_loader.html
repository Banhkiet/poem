<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Không gian thơ</title>

<style>

body{
font-family:Georgia,serif;
background:#f4f6fb;
padding:60px;
transition:0.4s;
}

.dark{
background:#0f1117;
color:#eee;
}

/* container */

.container{
max-width:700px;
margin:auto;
}

/* title */

.title{
font-size:34px;
text-align:center;
margin-bottom:30px;
}

/* poem */

.line{
font-size:22px;
margin:10px 0;
opacity:0;
transform:translateY(10px);
transition:0.8s;
cursor:pointer;
}

.line.show{
opacity:1;
transform:none;
}

.line:hover{
color:#6b7cff;
}

/* comment */

.comment-box{
margin-left:20px;
margin-top:5px;
}

.comment{
font-size:14px;
background:#eef2ff;
padding:4px 8px;
border-radius:4px;
margin:4px 0;
}

/* buttons */

.controls{
margin-top:30px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:8px 12px;
cursor:pointer;
border:none;
border-radius:6px;
}

/* emotions */

.emotions{
margin-top:30px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.emotion{
padding:6px 10px;
background:#e6e9ff;
border-radius:20px;
cursor:pointer;
}

.emotion:hover{
transform:scale(1.1);
}

/* emotion chart */

#chart{
margin-top:15px;
font-size:14px;
}

/* fireflies */

.firefly{
position:fixed;
width:6px;
height:6px;
background:#ffe66d;
border-radius:50%;
opacity:0.7;
animation:fly 6s linear infinite;
}

@keyframes fly{

0%{transform:translateY(0)}
100%{transform:translateY(-800px)}

}

.highlight{
background:yellow;
}

</style>

</head>

<body>

<div class="container">

<div class="title">

Mẹ Già

</div>

<div id="poem">

<div class="line">Mẹ già tóc bạc như sương</div>
<div class="line">Chiều chiều tựa cửa nhớ thương con hoài</div>
<div class="line">Cơm nghèo khói bếp đơn côi</div>
<div class="line">Con đi biền biệt cuối trời chưa về</div>

</div>


<div class="controls">

<button id="darkBtn">🌙 Đọc ban đêm</button>

<button id="readBtn">🎧 Nghe bài thơ</button>

</div>


<div class="emotions">

<div class="emotion" data="Buồn">🌧 Buồn</div>
<div class="emotion" data="Bâng khuâng">🌙 Bâng khuâng</div>
<div class="emotion" data="An yên">🍃 An yên</div>
<div class="emotion" data="Truyền cảm hứng">✨ Truyền cảm hứng</div>

</div>

<div id="chart"></div>

</div>



<script>

/* ================= HIỆN DẦN THƠ ================= */

const lines=document.querySelectorAll(".line");

lines.forEach((l,i)=>{

setTimeout(()=>{

l.classList.add("show");

},600*i);

});


/* ================= COMMENT THEO DÒNG ================= */

lines.forEach(line=>{

line.onclick=()=>{

let box=line.nextElementSibling;

if(!box || !box.classList.contains("comment-box")){

box=document.createElement("div");
box.className="comment-box";

const input=document.createElement("input");

input.placeholder="Bình luận dòng này...";

const list=document.createElement("div");

input.addEventListener("keypress",(e)=>{

if(e.key==="Enter"){

const div=document.createElement("div");

div.className="comment";

div.innerText=input.value;

list.appendChild(div);

input.value="";

}

});

box.appendChild(input);
box.appendChild(list);

line.after(box);

}

};

});


/* ================= DARK MODE ================= */

const darkBtn=document.getElementById("darkBtn");

darkBtn.onclick=()=>{

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){

spawnFireflies();

}

};


/* ================= FIREFLIES ================= */

function spawnFireflies(){

for(let i=0;i<15;i++){

const f=document.createElement("div");

f.className="firefly";

f.style.left=Math.random()*100+"%";

f.style.top=Math.random()*100+"%";

document.body.appendChild(f);

}

}


/* ================= AI READ ================= */

document.getElementById("readBtn").onclick=()=>{

let text="";

lines.forEach(l=>text+=l.innerText+". ");

const speech=new SpeechSynthesisUtterance(text);

speech.lang="vi-VN";

speechSynthesis.speak(speech);

};


/* ================= EMOTION ================= */

let emo={};

document.querySelectorAll(".emotion").forEach(btn=>{

btn.onclick=()=>{

const type=btn.getAttribute("data");

emo[type]=(emo[type]||0)+1;

renderChart();

};

});


function renderChart(){

let html="<b>Cảm xúc người đọc</b><br>";

for(let k in emo){

html+=k+" : "+emo[k]+"<br>";

}

document.getElementById("chart").innerHTML=html;

}


/* ================= HIGHLIGHT ================= */

document.addEventListener("mouseup",()=>{

const selection=window.getSelection();

if(selection.toString().length>0){

const span=document.createElement("span");

span.className="highlight";

try{

selection.getRangeAt(0).surroundContents(span);

}catch{}

selection.removeAllRanges();

}

});

</script>

</body>

</html>
